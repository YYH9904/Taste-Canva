<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Sensory Canva: Real-Time Decay Matrix</title>
    <style>body { margin: 0; overflow: hidden; background: #050505; }</style>
</head>
<body>
    <div id="container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform float u_time;
        uniform float u_seed;
        uniform float u_lifecycle; // 真實生命週期 (秒)
        uniform int u_productType; // 1: Q堤, 2: 義大利麵, 3: 霜淇淋
        varying vec2 vUv;

        // 色票矩陣 (依據產品資訊轉譯)
        vec3 getColorBase() {
            if(u_productType == 1) return vec3(1.0, 0.72, 0.77); // 草莓粉
            if(u_productType == 2) return vec3(0.96, 0.87, 0.70); // 小麥黃
            return vec3(0.24, 0.11, 0.01); // 巧克力棕
        }

        // ... (保留 random, noise, fbm 函數) ...

        void main() {
            vec2 uv = vUv;
            vec2 seedUv = uv + u_seed;
            
            // --- 核心：不可逆的時間消融對位 ---
            float progress = clamp(u_time / u_lifecycle, 0.0, 1.0);
            
            // 異步出生與死亡
            float birth = fbm(seedUv * 2.5) * (u_lifecycle * 0.2); 
            float growth = smoothstep(birth, birth + (u_lifecycle * 0.1), u_time);
            float decay = smoothstep(birth + (u_lifecycle * 0.4), u_lifecycle, u_time);
            float lifeAlpha = growth * (1.0 - decay);

            // --- 物理特性轉譯 ---
            vec2 q = vec2(fbm(seedUv + u_time * 0.005), fbm(seedUv));
            vec2 warpedUv;
            float texture;

            if (u_productType == 2) { // 義大利麵：縱向纖維
                warpedUv = seedUv + q * vec2(0.1, 0.8); 
                texture = fbm(warpedUv * vec2(3.0, 15.0));
            } else if (u_productType == 3) { // 霜淇淋：旋渦流體
                float r = length(uv - 0.5);
                float a = atan(uv.y-0.5, uv.x-0.5);
                warpedUv = uv + vec2(cos(a + r*5.0 + u_time*0.1), sin(a + r*5.0));
                texture = fbm(warpedUv * 5.0);
            } else { // Q堤：斷裂晶格
                warpedUv = seedUv + q * 0.3;
                texture = fbm(warpedUv * 8.0);
            }

            vec3 materialColor = mix(getColorBase(), vec3(1.0), texture * 0.3);
            
            // 消融狀態判定
            float finalOpacity = mix(0.1, 1.0, lifeAlpha);
            vec3 finalColor = materialColor * lifeAlpha;

            gl_FragColor = vec4(finalColor, finalOpacity);
        }
    </script>

    <script>
        // ... (Three.js 初始化) ...
        // 在此設定商品參數
        // u_productType: 1(草莓Q堤-480s), 2(麵-900s), 3(巧克力-240s)
        uniforms = {
            u_time: { value: 0.0 },
            u_seed: { value: Math.random() * 100.0 },
            u_lifecycle: { value: 240.0 }, // 以霜淇淋 4 分鐘為例
            u_productType: { value: 3 }
        };
        // ... (其餘邏輯保持不變) ...
    </script>
</body>
</html>
