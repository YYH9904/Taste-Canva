<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Sensory Canva: Wheat Nebula 15s</title>
    <style>body { margin: 0; overflow: hidden; background: #050505; }</style>
</head>
<body>
    <div id="container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform float u_time;
        uniform float u_seed; 
        varying vec2 vUv;

        // 還原你認可的溫潤色票
        vec3 colorBase = vec3(0.97, 0.94, 0.88); 
        vec3 colorHighlight = vec3(0.90, 0.78, 0.48); 
        vec3 colorDissipateMisty = vec3(0.35, 0.30, 0.20); 

        float random (vec2 st) { 
            return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); 
        }

        vec2 random2( vec2 p ) {
            return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);
        }

        float noise(in vec2 st) {
            vec2 i = floor(st); vec2 f = fract(st);
            vec2 u = f*f*(3.0-2.0*f);
            return mix( mix( dot( random2(i + vec2(0.0,0.0)), f - vec2(0.0,0.0) ), 
                             dot( random2(i + vec2(1.0,0.0)), f - vec2(1.0,0.0) ), u.x),
                        mix( dot( random2(i + vec2(0.0,1.0)), f - vec2(0.0,1.0) ), 
                             dot( random2(i + vec2(1.0,1.0)), f - vec2(1.0,1.0) ), u.x), u.y);
        }

        float fbm(in vec2 st) {
            float value = 0.0; float amplitude = 0.5;
            for (int i = 0; i < 4; i++) {
                value += amplitude * noise(st); st *= 2.0; amplitude *= 0.5;
            }
            return value;
        }

        void main() {
            // 座標偏移由隨機種子決定
            vec2 uv = vUv;
            vec2 seedUv = uv + vec2(u_seed * 2.3, u_seed * 1.7); 

            // --- 視覺核心：還原 V2 星雲纖維 (移除所有碎塊) ---
            // 透過多層低頻 Domain Warping 拉扯出星雲感
            vec2 q = vec2(fbm(seedUv + u_time * 0.01), fbm(seedUv + vec2(8.3, 2.8)));
            vec2 r = vec2(fbm(seedUv + 1.8 * q + vec2(sin(u_time * 0.03), cos(u_time * 0.03))),
                          fbm(seedUv + 1.8 * q + vec2(cos(u_time * 0.03), sin(u_time * 0.03))));
            
            vec2 warpedUv = seedUv + r * 0.22;
            float fiberTexture = fbm(warpedUv * 4.5); // 降低頻率，確保視覺大面積且柔和

            // --- 異步生命週期：局部時間控制 ---
            // 誕生偏移 (0~5秒隨機生長) 
            float birth = fbm(seedUv * 2.0) * 5.0;
            // 存活時長：讓纖維質感 (fiberTexture) 決定消融先後
            float life = 4.0 + fiberTexture * 6.0;

            // 1. 生長：從暗處緩慢「滲透」浮現 (3.5秒過渡)
            float growth = smoothstep(birth, birth + 3.5, u_time);
            // 2. 消融：順著纖維紋理散逸 (5秒過渡)
            float decay = smoothstep(birth + life, birth + life + 5.0, u_time);
            
            float lifeAlpha = growth * (1.0 - decay);
            // 全域 15 秒強制完成耗散
            lifeAlpha *= smoothstep(15.5, 14.0, u_time); 

            // 色彩與柔和質地
            vec3 materialColor = mix(colorBase, colorHighlight, fbm(warpedUv * 1.5));
            // 移除數位砂礫，僅保留極低頻的亮度變化
            materialColor *= mix(vec3(1.0), vec3(0.75), fiberTexture);

            // 散逸霧氣狀態
            vec3 ashColor = colorDissipateMisty * (0.85 + 0.15 * random(seedUv));
            float ashAlpha = 0.2 * noise(seedUv * 15.0 - u_time * 0.05);
            
            // 最終混合：從虛無浮現，再化為霧氣
            vec3 finalColor = mix(ashColor, materialColor, lifeAlpha);
            float finalOpacity = mix(ashAlpha, 1.0, lifeAlpha);

            // 邊緣星雲光暈 (柔和的能量邊界)
            float edge = (smoothstep(0.0, 0.3, lifeAlpha) - smoothstep(0.6, 1.0, lifeAlpha)) * lifeAlpha;
            finalColor += colorHighlight * edge * 0.45;

            gl_FragColor = vec4(finalColor, finalOpacity);
        }
    </script>

    <script>
        let scene, camera, renderer, uniforms, material, clock;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
            camera.position.z = 1; 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            clock = new THREE.Clock(); 
            uniforms = {
                u_time: { value: 0.0 },
                u_seed: { value: Math.random() * 999.0 }
            };

            material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true
            });

            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, false);

            clock.start();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value = clock.getElapsedTime(); 
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
