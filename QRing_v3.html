<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Q 堤 perpetual gradient v4</title>
<style>
html,body{
  margin:0;height:100%;overflow:hidden;
  background:radial-gradient(circle at 35% 18%, #fffafb 0%, #ffdce8 34%, #ffbfd3 66%, #f79fba 100%);
}
canvas{display:block}
</style>
</head>
<body>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const cam = new THREE.OrthographicCamera();
const VIEW_H = 8.8;

function resize(){
  const a = innerWidth / innerHeight;
  cam.left = -VIEW_H * a * 0.5;
  cam.right = VIEW_H * a * 0.5;
  cam.top = VIEW_H * 0.5;
  cam.bottom = -VIEW_H * 0.5;
  cam.near = 0.1;
  cam.far = 30;
  cam.position.set(0,0,10);
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}
resize();
addEventListener("resize", resize);

scene.add(new THREE.HemisphereLight(0xfffcfd, 0xf3b1c7, 1.5));

const key = new THREE.DirectionalLight(0xffffff, 1.28);
key.position.set(2.5, 3.8, 6.2);
scene.add(key);

const fill = new THREE.PointLight(0xff7fa3, 0.68, 18);
fill.position.set(-3, -1.8, 4.5);
scene.add(fill);

const rand = (a,b=0)=>Math.random()*(a-b)+b;
const clamp = THREE.MathUtils.clamp;
const smooth = THREE.MathUtils.smoothstep;
const geo = new THREE.SphereGeometry(1, 40, 40);

const berryChunkGeo = new THREE.PlaneGeometry(0.16, 0.09);

function berryChunkMat(){
  return new THREE.MeshBasicMaterial({
    color: new THREE.Color().setRGB(
      0.96 + Math.random()*0.04,
      0.08 + Math.random()*0.05,
      0.12 + Math.random()*0.05
    ),
    transparent: true,
    opacity: 0.98,
    side: THREE.DoubleSide,
    depthWrite: false
  });
}

function attachSurfaceCrumbs(node, count = 5 + Math.floor(Math.random()*3)){
  for(let i=0;i<count;i++){
    const piece = new THREE.Mesh(berryChunkGeo, berryChunkMat());

    // 直接限制在球的前半部，保證看得到
    const x = rand(0.55, -0.55);
    const y = rand(0.55, -0.55);
    const z = 0.92 + rand(0.08, 0.0);

    piece.position.set(x, y, z);

    piece.rotation.z = rand(Math.PI*2, 0);
    piece.rotation.x = rand(0.35, -0.35);
    piece.rotation.y = rand(0.35, -0.35);

    const s = 0.55 + Math.random()*0.45;
    piece.scale.set(s, s * rand(1.35, 0.7), 1);

    node.mesh.add(piece);
  }
}

function bounds(){
  return { w: cam.right * 0.92, h: cam.top * 0.84 };
}

function softMat(seed){
  const m = new THREE.MeshPhysicalMaterial({
    color:new THREE.Color().setRGB(1.00, 0.66 + Math.random()*0.05, 0.82 + Math.random()*0.04),
    roughness:0.18,
    clearcoat:0.28,
    clearcoatRoughness:0.18,
    sheen:1.0,
    sheenColor:new THREE.Color("#fff7f3"),
    transparent:true
  });

  m.onBeforeCompile = s=>{
    m.userData.shader = s;
    s.uniforms.uAlpha = { value:1 };
    s.uniforms.uHit   = { value:0 };
    s.uniforms.uSeed  = { value:seed };

    s.fragmentShader = s.fragmentShader
      .replace("#include <common>",`
        #include <common>
        uniform float uAlpha, uHit, uSeed;
      `)
      .replace("#include <color_fragment>",`
        #include <color_fragment>
        vec3 n = normalize(vNormal);

        float softFront = pow(max(dot(n,vec3(0.0,0.0,1.0)),0.0),0.48);
        diffuseColor.rgb = mix(diffuseColor.rgb, vec3(1.0,0.80,0.88), softFront * 0.42);

        float rim = pow(1.0 - max(dot(n,vec3(0.0,0.0,1.0)),0.0),2.6);
        diffuseColor.rgb += vec3(1.0,0.52,0.74) * rim * 0.07;

        diffuseColor.rgb += vec3(1.0,0.55,0.65) * uHit * 0.04;
        diffuseColor.a *= uAlpha;
      `);
  };
  return m;
}

function makeNode(r){
  const mesh = new THREE.Mesh(geo, softMat(Math.random()*1000));
  mesh.visible = false;
  scene.add(mesh);

  const node = {
    mesh, r,
    pos:new THREE.Vector3(),
    vel:new THREE.Vector3(),
    target:new THREE.Vector3(),
    hit:0, born:false, dying:false, dead:false,
    spawn:0, dieAt:0, breathe:Math.random()*10,
    kind:"free",
    ringId:-1,
    slotId:-1,
    wobX:0,
    wobY:0
  };

  // 每顆球掛上鮮紅草莓碎片
  attachSurfaceCrumbs(node);

  return node;
}

function ringSlots(center, radius, count=8){
  const arr = [];
  for(let i=0;i<count;i++){
    const a = i/count*Math.PI*2 - Math.PI/2;
    const x = Math.cos(a) * radius;
    const y = Math.sin(a) * radius * 0.82;
    const bulge = 0.16;
    const bx = Math.cos(a) * bulge;
    const by = Math.sin(a) * bulge * 0.82;
    arr.push(new THREE.Vector3(center.x + x + bx, center.y + y + by, 0));
  }
  return arr;
}

const rings = [];
const freeNodes = [];

// 漂浮草莓碎片
const crumbGroup = new THREE.Group();
scene.add(crumbGroup);

function addCrumbs(count=260){
  while(crumbGroup.children.length){
    const c = crumbGroup.children.pop();
    c.geometry?.dispose?.();
    c.material?.dispose?.();
  }

  for(let i=0;i<count;i++){
    const w = 0.018 + Math.random()*0.065;
    const h = 0.010 + Math.random()*0.030;
    const g = new THREE.PlaneGeometry(w, h);

    const m = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setRGB(
        0.90 + Math.random()*0.10,
        0.05 + Math.random()*0.08,
        0.10 + Math.random()*0.08
      ),
      transparent: true,
      opacity: 0.22 + Math.random()*0.55,
      depthWrite: false,
      side: THREE.DoubleSide
    });

    const piece = new THREE.Mesh(g, m);
    piece.position.set(
      rand(cam.right*1.08, cam.left*1.08),
      rand(cam.top*1.02, cam.bottom*1.02),
      rand(0.2, -0.2)
    );
    piece.rotation.z = rand(Math.PI*2, 0);

    piece.userData = {
      baseX: piece.position.x,
      baseY: piece.position.y,
      phase: Math.random()*10,
      speed: 0.05 + Math.random()*0.18,
      driftX: rand(0.03, -0.03),
      driftY: rand(0.025, -0.025),
      spin: rand(0.004, -0.004),
      pulse: 0.85 + Math.random()*0.3
    };

    crumbGroup.add(piece);
  }
}

function clearAll(){
  [...rings.flatMap(r=>r.nodes), ...freeNodes].forEach(n=>scene.remove(n.mesh));
  rings.length = 0;
  freeNodes.length = 0;
}

function spawnMainRing(x,y,delay=0){
  let cx = x, cy = y, tries = 0;
  while(tries < 20){
    let ok = true;
    for(const r of rings){
        const dx = r.center.x - cx;
        const dy = r.center.y - cy;
        if(Math.hypot(dx, dy) < 2.6){ ok = false; break; }
    }
    if(ok) break;
    cx += rand(1.0, -1.0);
    cy += rand(0.8, -0.8);
    tries++;
  }
  const center = new THREE.Vector3(cx,cy,0);
  const radius = 1.08;
  const slots = ringSlots(center, radius, 8);

  const nodes = slots.map((slot,i)=>{
    const n = makeNode((0.155 + Math.random()*0.012) * 1.9);
    n.kind = "main";
    n.ringId = rings.length;
    n.slotId = i;
    n.spawn = delay + i*0.55 + rand(3.2,0);
    n.target.copy(slot);

    const a = rand(Math.PI*2,0), d = rand(2.6,1.6);
    n.pos.set(center.x + Math.cos(a)*d, center.y + Math.sin(a)*d*0.72, 0);
    n.vel.set(rand(0.0015,-0.0015), rand(0.0015,-0.0015), 0);
    return n;
  });

  rings.push({
    type:"main",
    center, radius, nodes,
    eatClock: 18 + rand(5,0),
    respawnAt: Infinity
  });
}

function spawnWanderRing(x,y,count=8){
  const center = new THREE.Vector3(x,y,0);
  const radius = 0.78 + Math.random()*0.12;
  const allSlots = ringSlots(center, radius, 8);
  let pick;
  
  if(count===8){
    pick = [...Array(8).keys()];
  }else if(count===3){
    pick = [0, 3, 6];
  }else if(count===2){
    pick = [1, 5];
  }else{
    const candidates = [0,2,4,6,1,3,5,7];
    pick = candidates.slice(0, count);
  }

  const nodes = pick.map(i=>{
    const n = makeNode((0.145 + Math.random()*0.012) * 1.9);
    n.kind = "wander";
    n.ringId = rings.length;
    n.slotId = i;
    n.spawn = rand(3,0);
    n.target.copy(allSlots[i]);
    n.pos.copy(allSlots[i]).add(new THREE.Vector3(rand(0.08,-0.08), rand(0.08,-0.08), 0));
    n.vel.set(rand(0.0008,-0.0008), rand(0.0008,-0.0008), 0);
    return n;
  });

  rings.push({
    type:"wander",
    center, radius, nodes,
    drift:new THREE.Vector3(rand(0.00035,-0.00035), rand(0.00028,-0.00028), 0),
    phase:Math.random()*10,
    respawnAt: Infinity
  });
}

function farEnoughFromOthers(x, y, minDist = 1.6){
  const p = new THREE.Vector2(x, y);

  for(const r of rings){
    if(p.distanceTo(new THREE.Vector2(r.center.x, r.center.y)) < minDist) return false;
  }

  for(const n of freeNodes){
    if(p.distanceTo(new THREE.Vector2(n.pos.x, n.pos.y)) < minDist) return false;
  }

  return true;
}

function spawnFree(x,y){
  let px = x, py = y, tries = 0;
  while(tries < 30 && !farEnoughFromOthers(px, py, 1.8)){
    px = rand(6,-6);
    py = rand(4,-4);
    tries++;
  }

  const n = makeNode((0.18 + Math.random()*0.04) * 1.75);
  n.kind = "free";
  n.spawn = rand(8,0);
  n.pos.set(px,py,0);
  n.target.copy(n.pos);
  n.vel.set(rand(0.0007,-0.0007), rand(0.0007,-0.0007), 0);
  freeNodes.push(n);
}

function initScene(){
  clearAll();
  addCrumbs(220);

  spawnMainRing(-2.4,  0.9, 0);
  spawnMainRing( 2.2, -0.6, 5.0);

  spawnWanderRing(-5.4,  2.5, 8);
  spawnWanderRing( 5.4,  2.3, 8);
  spawnWanderRing( 0.0,  3.4, 3);
  spawnWanderRing( 0.0, -3.4, 3);

  for(let i=0;i<6;i++) spawnFree(rand(6,-6), rand(4,-4));
}

function reviveRing(r, t){
  const b = bounds();
  const presets = {
    main:   { x: rand(b.w*0.55,-b.w*0.55), y: rand(b.h*0.45,-b.h*0.45), radius:1.08 },
    wander: { x: rand(b.w*0.85,-b.w*0.85), y: rand(b.h*0.78,-b.h*0.78), radius:0.78+Math.random()*0.12 }
  };
  const p = presets[r.type];

  r.center.set(p.x,p.y,0);
  r.radius = p.radius;
  const slots = ringSlots(r.center, r.radius, 8);

  r.nodes.forEach((n,i)=>{
    n.ringId = rings.indexOf(r);
    n.slotId = i;
    n.dead = false;
    n.dying = false;
    n.born = false;
    n.mesh.visible = false;
    n.hit = 0;
    n.wobX = 0;
    n.wobY = 0;
    n.spawn = t + (r.type==="main" ? i*0.55 + rand(2.8,0) : rand(2.2,0));

    const slot = slots[i];
    n.target.copy(slot);

    if(r.type==="main"){
      const a = rand(Math.PI*2,0), d = rand(2.5,1.5);
      n.pos.set(r.center.x + Math.cos(a)*d, r.center.y + Math.sin(a)*d*0.72, 0);
      n.vel.set(rand(0.0014,-0.0014), rand(0.0014,-0.0014), 0);
    }else{
      n.pos.copy(slot).add(new THREE.Vector3(rand(0.08,-0.08), rand(0.08,-0.08), 0));
      n.vel.set(rand(0.0007,-0.0007), rand(0.0007,-0.0007), 0);
    }
  });

  if(r.type==="main") r.eatClock = t + 18 + rand(5,0);
  if(r.type==="wander"){
    r.drift.set(rand(0.00035,-0.00035), rand(0.00028,-0.00028), 0);
    r.phase = Math.random()*10;
  }
  r.respawnAt = Infinity;
}

function collide(nodes){
  for(let i=0;i<nodes.length;i++){
    const a = nodes[i];
    if(!a.born || a.dead) continue;

    for(let j=i+1;j<nodes.length;j++){
      const b = nodes[j];
      if(!b.born || b.dead) continue;

      if(a.ringId >= 0 && a.ringId === b.ringId) continue;
      if(a.kind==="free" && b.kind==="free") continue;

      const d = new THREE.Vector3().subVectors(b.pos,a.pos);
      let dist = d.length();
      const min = a.r + b.r + 0.14;
      if(dist >= min) continue;

      if(dist < 0.0001){
        d.set(1,0,0);
        dist = 0.0001;
      }
      d.multiplyScalar(1/dist);

      const overlap = min - dist;
      a.pos.addScaledVector(d,-overlap*0.78);
      b.pos.addScaledVector(d, overlap*0.78);

      // 位移彈開小一點
      a.vel.addScaledVector(d,-0.0022-overlap*0.020);
      b.vel.addScaledVector(d, 0.0022+overlap*0.020);

      // 局部晃動能量
      a.hit = Math.min(1, a.hit + 0.95);
      b.hit = Math.min(1, b.hit + 0.95);

      a.wobX += rand(0.06,-0.06);
      a.wobY += rand(0.06,-0.06);
      b.wobX += rand(0.06,-0.06);
      b.wobY += rand(0.06,-0.06);
    }
  }
}

function updateNode(n,t,dt){
  if(t < n.spawn){
    n.mesh.visible = false;
    return;
  }

  if(!n.born){
    n.born = true;
    n.mesh.visible = true;
  }

  const bornT = smooth(t, n.spawn, n.spawn + 1.6);

  // 長出來之後，再用一小段時間慢慢解鎖移動
  const moveT = smooth(t, n.spawn + 1.4, n.spawn + 4.2);

  if(moveT > 0.0){
    n.vel.x += Math.sin(t*0.18 + n.breathe) * 0.00003 * moveT;
    n.vel.y += Math.cos(t*0.16 + n.breathe*1.2) * 0.00003 * moveT;

    if(n.kind==="main" || n.kind==="wander"){
        const to = new THREE.Vector3().subVectors(n.target,n.pos);
        n.vel.addScaledVector(to, (n.kind==="main" ? 0.00007 : 0.00006) * moveT);
    }else{
        n.vel.x += Math.sin(t*0.08 + n.breathe) * 0.000015 * moveT;
        n.vel.y += Math.cos(t*0.07 + n.breathe) * 0.000015 * moveT;
    }

    n.vel.multiplyScalar(0.992);
    n.pos.addScaledVector(n.vel, dt*60);

    const b = bounds();
    if(n.pos.x < -b.w+n.r){ n.pos.x=-b.w+n.r; n.vel.x*=-0.55; n.hit=0.4; }
    if(n.pos.x >  b.w-n.r){ n.pos.x= b.w-n.r; n.vel.x*=-0.55; n.hit=0.4; }
    if(n.pos.y < -b.h+n.r){ n.pos.y=-b.h+n.r; n.vel.y*=-0.55; n.hit=0.4; }
    if(n.pos.y >  b.h-n.r){ n.pos.y= b.h-n.r; n.vel.y*=-0.55; n.hit=0.4; }
  }else{
    // 長出來前幾乎不移動
    n.vel.multiplyScalar(0.75);
  }

  let alpha = bornT;
  let scaleCut = 1;

  if(n.dying){
    const k = clamp((t-n.dieAt)/1.4, 0, 1);
    scaleCut = 1 - smooth(k,0,1);
    alpha *= scaleCut;
    if(k>=1){
      n.dead = true;
      n.mesh.visible = false;
      return;
    }
  }

  const pulse = 1 + Math.sin(t*18 + n.breathe) * n.hit * 0.08;

  n.wobX *= 0.88;
  n.wobY *= 0.88;

  const wobblePos = new THREE.Vector3(
    Math.sin(t*22 + n.breathe) * n.wobX * n.r * 0.45,
    Math.cos(t*20 + n.breathe*1.3) * n.wobY * n.r * 0.45,
    0
  );

  n.hit *= 0.90;

  const breath = 1 + Math.sin(t*0.72 + n.breathe)*0.018;
  const s = n.r * breath * pulse * scaleCut * bornT;

  n.mesh.position.copy(n.pos).add(wobblePos);
  n.mesh.scale.set(
    s * (1.0 + n.hit*0.015),
    s * (1.0 - n.hit*0.008),
    s
  );

  const sh = n.mesh.material.userData.shader;
  if(sh){
    sh.uniforms.uAlpha.value = alpha;
    sh.uniforms.uHit.value = n.hit;
  }
  n.mesh.material.opacity = alpha;
}

function updateRings(t){
  rings.forEach(r=>{
    if(r.type==="wander"){
      r.center.x += r.drift.x + Math.sin(t*0.10 + r.phase)*0.00008;
      r.center.y += r.drift.y + Math.cos(t*0.09 + r.phase)*0.00006;

      const b = bounds();
      if(r.center.x < -b.w*0.86 || r.center.x > b.w*0.86) r.drift.x *= -1;
      if(r.center.y < -b.h*0.80 || r.center.y > b.h*0.80) r.drift.y *= -1;

      const slots = ringSlots(r.center, r.radius, 8);
      r.nodes.forEach((n,i)=>n.target.copy(slots[i]));
    }

    if(r.type==="main" && t > r.eatClock){
      const alive = r.nodes.filter(n=>n.born && !n.dying && !n.dead);
      if(alive.length){
        alive.sort((a,b)=>a.pos.distanceToSquared(r.center)-b.pos.distanceToSquared(r.center));
        alive[alive.length-1].dying = true;
        alive[alive.length-1].dieAt = t;
        r.eatClock = t + 1.2 + rand(1.0,0);
      }else if(r.respawnAt===Infinity){
        r.respawnAt = t + 4 + rand(3,0);
      }
    }

    if(r.type==="wander"){
      const alive = r.nodes.filter(n=>!n.dead);
      if(!alive.length && r.respawnAt===Infinity) r.respawnAt = t + 5 + rand(5,0);
    }

    if(t > r.respawnAt) reviveRing(r,t);
  });

  freeNodes.forEach(n=>{
    if(n.dead && t > n.spawn + 18 + rand(6,0)){
      n.dead = false;
      n.dying = false;
      n.born = false;
      n.mesh.visible = false;
      n.hit = 0;
      n.wobX = 0;
      n.wobY = 0;
      n.spawn = t + rand(5,0);
      n.pos.set(rand(6,-6), rand(4,-4), 0);
      n.target.copy(n.pos);
      n.vel.set(rand(0.0007,-0.0007), rand(0.0007,-0.0007), 0);
    }else if(!n.dead && !n.dying && Math.random()<0.00035){
      n.dying = true;
      n.dieAt = t;
    }
  });
}

let start=0,last=0;
initScene();

function loop(now){
  requestAnimationFrame(loop);
  now *= 0.001;
  if(!start){ start=now; last=now; }

  const t = now - start;
  const dt = Math.min(now - last, 0.033);
  last = now;

  // 漂浮草莓碎片動畫
  crumbGroup.children.forEach(c=>{
    const u = c.userData;
    c.position.x = u.baseX + Math.sin(t * u.speed + u.phase) * u.driftX;
    c.position.y = u.baseY + Math.cos(t * (u.speed*0.85) + u.phase) * u.driftY;
    c.rotation.z += u.spin;
    c.material.opacity = (0.18 + 0.42 * (0.5 + 0.5 * Math.sin(t * u.speed * 1.4 + u.phase))) * u.pulse;
  });

  updateRings(t);

  const all = [...rings.flatMap(r=>r.nodes), ...freeNodes];
  all.forEach(n=>updateNode(n,t,dt));
  collide(all);
  all.forEach(n=>{ if(n.born && !n.dead) updateNode(n,t,0); });

  renderer.render(scene,cam);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
