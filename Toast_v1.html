<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Sensory Canva: Non-Linear Organic Decay</title>
    <style>body { margin: 0; overflow: hidden; background: #080808; }</style>
</head>
<body>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform float u_time;
        varying vec2 vUv;

        // 小麥生吐司感官色票
        vec3 colorBase = vec3(0.97, 0.94, 0.88); 
        vec3 colorHighlight = vec3(0.90, 0.78, 0.48); 
        vec3 colorDissipateMisty = vec3(0.35, 0.30, 0.20); // 暖色散逸霧氣

        float random (vec2 st) { 
            return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); 
        }

        vec2 random2( vec2 p ) {
            return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);
        }

        float noise(in vec2 st) {
            vec2 i = floor(st); vec2 f = fract(st);
            vec2 u = f*f*(3.0-2.0*f);
            return mix( mix( dot( random2(i + vec2(0.0,0.0)), f - vec2(0.0,0.0) ), 
                             dot( random2(i + vec2(1.0,0.0)), f - vec2(1.0,0.0) ), u.x),
                        mix( dot( random2(i + vec2(0.0,1.0)), f - vec2(0.0,1.0) ), 
                             dot( random2(i + vec2(1.0,1.0)), f - vec2(1.0,1.0) ), u.x), u.y);
        }

        float fbm(in vec2 st) {
            float value = 0.0;
            float amplitude = 0.5;
            for (int i = 0; i < 4; i++) {
                value += amplitude * noise(st);
                st *= 2.0;
                amplitude *= 0.5;
            }
            return value;
        }

        float voronoi(in vec2 st) {
            vec2 i = floor(st);
            vec2 f = fract(st);
            float m_dist = 1.0;
            for (int y= -1; y<=1; y++) {
                for (int x= -1; x<=1; x++) {
                    vec2 neighbor = vec2(float(x),float(y));
                    vec2 point = random2(i + neighbor);
                    // 讓細胞的呼吸頻率也產生亂數，避免同步跳動
                    vec2 timeDisturbance = vec2(sin(u_time * 0.2 + point.x * 10.0), cos(u_time * 0.15 - point.y * 10.0)) * 0.12;
                    float dist = distance(f, neighbor + point + timeDisturbance);
                    m_dist = min(m_dist, dist);
                }
            }
            return m_dist;
        }

        void main() {
            vec2 uv = vUv;
            
            // 全局時間 (0.0 -> 1.0)
            float globalT = mod(u_time * 0.033, 1.0); 

            // --- 【關鍵迭代】：非線性局部時間 (Local Time Distortion) ---
            // 創造一個決定「衰老速度」的場域
            float speedMap = fbm(uv * 4.0 + u_time * 0.05);
            // 將 speedMap 映射到 0.2 (極快衰老) 到 5.0 (極慢衰老) 的指數曲線上
            float localDecayRate = mix(0.2, 5.0, speedMap);
            
            // 每個像素擁有自己的獨立時間軸 (localT)
            float localT = pow(globalT, localDecayRate);

            // --- 空間扭曲與質地 ---
            vec2 q;
            q.x = fbm(uv + u_time * 0.015 + vec2(1.7, 9.2));
            q.y = fbm(uv + u_time * 0.015 + vec2(8.3, 2.8));
            vec2 r;
            r.x = fbm(uv + 2.0 * q + vec2(sin(u_time * 0.05), cos(u_time * 0.05)) * 0.4);
            r.y = fbm(uv + 2.0 * q + vec2(cos(u_time * 0.05), sin(u_time * 0.05)) * 0.4);

            vec2 warpedUv = uv + r * 0.35; // 增強拉扯感

            float basePorosity = voronoi(warpedUv * 15.0);
            float fractalPorosity = fbm(warpedUv * 30.0);
            // 讓孔隙的斷裂感更強
            float finalPorosity = pow(mix(basePorosity, fractalPorosity, 0.45), 1.8); 

            // 基礎色彩與烤色
            float bakeMask = smoothstep(0.0, 0.9, fbm(warpedUv * 2.0 + u_time * 0.02));
            vec3 materialColor = mix(colorBase, colorHighlight, bakeMask);
            float grainNoise = random(uv * 180.0) * 0.15;
            materialColor -= vec3(grainNoise); 
            materialColor *= mix(vec3(0.9), vec3(0.4), smoothstep(0.0, 0.5, finalPorosity));

            // --- 結構強度與坍塌 ---
            float globalEntropy = fbm(uv * 7.0 - u_time * 0.1);
            float structureStrength = finalPorosity * 0.5 + globalEntropy * 0.5;
            
            // 【關鍵迭代】：使用獨立的 localT 取代統一的 globalT 進行判斷
            // 並將平滑過渡帶 (smoothstep 的範圍) 拉寬，讓崩解過程更綿長、不乾脆
            float collapseMask = smoothstep(localT - 0.25, localT + 0.15, structureStrength);

            // --- 暖色散逸霧氣 ---
            vec3 ashColor = colorDissipateMisty * random(uv * 100.0 + mod(u_time, 100.0));
            // 讓霧氣像煙霧般滾動
            float ashAlpha = 0.25 * fbm(uv * 20.0 - u_time * 0.1); 
            
            vec3 finalColor = mix(ashColor, materialColor, collapseMask);
            float finalAlpha = mix(ashAlpha, 1.0, collapseMask);

            // 崩解邊緣的能量光暈
            float edge = smoothstep(localT - 0.05, localT + 0.1, structureStrength) - smoothstep(localT + 0.1, localT + 0.2, structureStrength);
            // 讓邊緣的發光也隨機閃爍，增添有機感
            finalColor += colorHighlight * edge * (0.8 + 0.5 * sin(u_time * 10.0 + uv.x * 50.0));

            gl_FragColor = vec4(finalColor, finalAlpha);
        }
    </script>

    <script>
        let scene, camera, renderer, uniforms, material;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
            camera.position.z = 1; 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            uniforms = {
                u_time: { value: 0.0 }
            };

            material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true
            });

            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, false);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // 30秒生命週期
            uniforms.u_time.value += 0.02; 
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
